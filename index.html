<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April Referendum — Absentee Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --dem:      #2166ac;
    --dem-lt:   #74add1;
    --rep:      #c0392b;
    --rep-lt:   #e57368;
    --unk:      #7f8c8d;
    --unk-lt:   #b2bec3;
    --ip:       #8e44ad;
    --ip-lt:    #bb8fce;
    --mail:     #27ae60;
    --mail-lt:  #55c97a;
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #20243a;
    --border:   #2a2d3a;
    --text:     #e8eaf0;
    --muted:    #8890a8;
    --accent:   #3a8fd4;
    --radius:   8px;
    --mono:     'DM Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  header h1 {
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .03em;
    color: var(--text);
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }

  /* ── TOP NAV TABS ── */
  .top-tabs {
    display: flex;
    gap: 4px;
  }
  .top-tab {
    padding: 6px 16px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: .82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .top-tab:hover { color: var(--text); background: var(--border); }
  .top-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .header-right { display: flex; align-items: center; gap: 16px; }
  #days-remaining {
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
    background: rgba(58,143,212,.15);
    border: 2px solid rgba(58,143,212,.5);
    padding: 8px 18px;
    border-radius: 20px;
    white-space: nowrap;
  }
  #last-updated {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 53px);
  }

  /* sidebar hidden on trends tab */
  .layout.no-sidebar { grid-template-columns: 1fr; }
  .layout.no-sidebar aside { display: none; }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    overflow-y: auto;
  }
  aside h2 {
    font-size: .62rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 8px;
  }
  #county-search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: .8rem;
    padding: 6px 10px;
    border-radius: var(--radius);
    margin-bottom: 6px;
    outline: none;
  }
  #county-search:focus { border-color: var(--accent); }
  #county-search::placeholder { color: var(--muted); }

  #county-list { list-style: none; display: flex; flex-direction: column; gap: 1px; }
  #county-list li {
    padding: 6px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: .8rem;
    color: var(--muted);
    transition: background .1s, color .1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #county-list li:hover { background: var(--border); color: var(--text); }
  #county-list li.active { background: var(--accent); color: #fff; font-weight: 600; }
  #county-list li .badge {
    font-family: var(--mono);
    font-size: .66rem;
    background: rgba(255,255,255,.1);
    padding: 1px 5px;
    border-radius: 20px;
  }
  .statewide-btn {
    display: block; width: 100%; padding: 7px 10px; margin-bottom: 8px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--sans); font-size: .8rem; border-radius: var(--radius);
    cursor: pointer; text-align: left; font-weight: 600;
    transition: background .1s, border-color .1s;
  }
  .statewide-btn:hover { background: var(--border); }
  .statewide-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── MAIN ── */
  main { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

  .section-title {
    font-size: .62rem; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .section-banner {
    font-size: 1.1rem; font-weight: 700; color: var(--text);
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
    letter-spacing: .02em;
  }

  /* ── STAT CARDS ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
  }
  .stat-card.dem   { border-top: 3px solid var(--dem); }
  .stat-card.rep   { border-top: 3px solid var(--rep); }
  .stat-card.unk   { border-top: 3px solid var(--unk); }
  .stat-card.total { border-top: 3px solid var(--accent); }
  .stat-card.out   { border-top: 3px solid var(--mail); }
  .stat-card.ip    { border-top: 3px solid var(--ip); }
  .stat-label { font-size: .67rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .stat-value { font-family: var(--mono); font-size: 1.4rem; font-weight: 500; color: var(--text); margin-top: 2px; }
  .stat-sub   { font-size: .7rem; color: var(--muted); margin-top: 2px; }
  .stat-card.dem .stat-sub  { color: var(--dem-lt); }
  .stat-card.rep .stat-sub  { color: var(--rep-lt); }
  .stat-card.ip  .stat-sub  { color: var(--ip-lt); }
  .stat-card.out .stat-sub  { color: var(--mail-lt); }

  /* ── CHART GRID ── */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-card h3 {
    font-size: .68rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .chart-card canvas { max-height: 240px; }
  .chart-card.tall canvas { max-height: 300px; }

  /* ── TOGGLE BUTTONS ── */
  .toggle-row {
    display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
    align-items: center; justify-content: space-between;
  }
  .toggle-row h3 {
    font-size: .68rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
  }
  .toggle-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 6px; border: 2px solid var(--border);
    background: none; color: var(--muted); font-family: var(--sans); font-size: .85rem;
    cursor: pointer; transition: all .12s;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .toggle-btn.active { color: var(--text-hi); border-color: var(--border-hi); background: rgba(255,255,255,.08); }

  /* colored swatch inside each toggle button */
  .line-swatch {
    display: inline-block;
    width: 14px; height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    opacity: 0.35;
    transition: opacity .12s;
  }
  .toggle-btn.active .line-swatch { opacity: 1; }

  [data-cum="dem_ip"].active, [data-cum="dem_mail"].active { border-color: var(--dem); background: rgba(33,102,172,.15); color: var(--text-hi); }
  [data-cum="rep_ip"].active, [data-cum="rep_mail"].active { border-color: var(--rep); background: rgba(192,57,43,.15); color: var(--text-hi); }

  /* ── TABLE ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .table-header h3 { font-size: .68rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  #precinct-search {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--sans); font-size: .78rem; padding: 5px 10px;
    border-radius: var(--radius); outline: none; width: 180px;
  }
  #precinct-search:focus { border-color: var(--accent); }
  #precinct-search::placeholder { color: var(--muted); }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  thead th {
    padding: 9px 12px; text-align: right; font-size: .62rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .08s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  td {
    padding: 8px 12px; text-align: right;
    font-family: var(--mono); font-size: .76rem; color: var(--text); white-space: nowrap;
  }
  td:first-child { text-align: left; font-family: var(--sans); }
  td.dem-col { color: var(--dem-lt); }
  td.rep-col { color: var(--rep-lt); }
  td.unk-col { color: var(--unk-lt); }
  td.out-col { color: var(--mail-lt); }
  td.ip-col  { color: var(--ip-lt); }
  .table-footer {
    padding: 8px 16px; border-top: 1px solid var(--border);
    font-size: .7rem; color: var(--muted); font-family: var(--mono);
  }

  /* ── TRENDS ── */
  .trends-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

  /* ── DAY LABEL WEEKEND ── */
  .wknd { color: var(--rep-lt) !important; }

  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .error-box {
    background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.4);
    border-radius: var(--radius); padding: 14px 18px; color: #e57368;
    font-family: var(--mono); font-size: .8rem;
  }
</style>
</head>

55d2PUmvSI4Qh6AY54qTGcV8nj8zr4p++9D6fBZbSwy91XYxRhafQ3Q0V5yVtD0tep//2Q==" alt="VA Dems" style="height:36px;background:#fff;border-radius:6px;padding:3px 8px;opacity:0.95;">
    <h1><span>April Referendum</span> — Absentee Tracker</h1>
    <div class="top-tabs">
      <button class="top-tab active" data-tab="summary">Summary</button>
      <button class="top-tab" data-tab="trends">Daily Trends</button>
      <button class="top-tab" data-tab="comparison">Historical Comparison</button>
    </div>
  </div>
  <div class="header-right">
    <div id="days-remaining">— days to election</div>
    <div id="last-updated">Loading…</div>
  </div>
</header>

<div class="layout" id="layout">
  <aside id="sidebar">
    <button class="statewide-btn active" id="btn-statewide">🗺 Statewide</button>
    <h2>Counties</h2>
    <input type="text" id="county-search" placeholder="Search county…">
    <ul id="county-list"></ul>
  </aside>
  <main id="main-content">
    <div class="loading">Loading data…</div>
  </main>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────
let DATA = { summary: null, counties: [], precincts: [], daily: [], meta: null, comparison: null };
let currentTab    = 'summary';
let currentCounty = null;
let charts = {};

const ELECTION_DAY = new Date('2026-04-21');

// ── BOOT ──────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [summary, counties, precincts, daily, meta, comparison] = await Promise.all([
      fetch('data/summary.json').then(r => r.json()),
      fetch('data/counties.json').then(r => r.json()),
      fetch('data/precincts.json').then(r => r.json()),
      fetch('data/daily.json').then(r => r.json()),
      fetch('data/metadata.json').then(r => r.json()),
      fetch('data/comparison.json').then(r => r.json()).catch(() => null),
    ]);
    DATA = { summary, counties, precincts, daily, meta, comparison };

    document.getElementById('last-updated').textContent = `Updated: ${meta.last_updated}`;

    const today = new Date();
    const days  = Math.ceil((ELECTION_DAY - today) / 86400000);
    document.getElementById('days-remaining').textContent =
      days > 0 ? `${days} days to election` : 'Election Day';

    buildSidebar();
    renderView();
  } catch(err) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-box">Failed to load data files.<br>${err}</div>`;
  }
}

// ── TAB NAV ───────────────────────────────────────────────────────────────
document.querySelectorAll('.top-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    // Clicking Summary always resets to statewide
    if (currentTab === 'summary') {
      currentCounty = null;
      document.getElementById('btn-statewide').classList.add('active');
      document.querySelectorAll('#county-list li').forEach(li => li.classList.remove('active'));
    }
    document.querySelectorAll('.top-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const layout = document.getElementById('layout');
    layout.classList.toggle('no-sidebar', currentTab === 'trends' || currentTab === 'comparison');
    renderView();
  });
});

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function buildSidebar() {
  const ul = document.getElementById('county-list');
  const counties = DATA.counties.slice().sort((a,b) => a.CountyName.localeCompare(b.CountyName));

  function render(filter='') {
    ul.innerHTML = '';
    counties
      .filter(c => c.CountyName.toLowerCase().includes(filter.toLowerCase()))
      .forEach(c => {
        const li = document.createElement('li');
        li.dataset.county = c.CountyName;
        if (currentCounty === c.CountyName) li.classList.add('active');
        li.innerHTML = `<span>${c.CountyName}</span><span class="badge">${fmt(c.VotedCount)}</span>`;
        li.addEventListener('click', () => selectCounty(c.CountyName));
        ul.appendChild(li);
      });
  }
  render();
  document.getElementById('county-search').addEventListener('input', e => render(e.target.value));
}

function selectCounty(name) {
  currentCounty = name;
  document.getElementById('btn-statewide').classList.remove('active');
  document.querySelectorAll('#county-list li').forEach(li =>
    li.classList.toggle('active', li.dataset.county === name));
  renderView();
}

document.getElementById('btn-statewide').addEventListener('click', () => {
  currentCounty = null;
  document.getElementById('btn-statewide').classList.add('active');
  document.querySelectorAll('#county-list li').forEach(li => li.classList.remove('active'));
  renderView();
});

// ── RENDER DISPATCH ───────────────────────────────────────────────────────
function renderView() {
  destroyCharts();
  const main = document.getElementById('main-content');
  if (currentTab === 'trends') {
    renderTrends(main);
  } else if (currentTab === 'comparison') {
    renderPartyPace(main);
  } else if (currentCounty === null) {
    renderStatewide(main);
  } else {
    renderCounty(main, currentCounty);
  }
}

// ── SUMMARY — STATEWIDE ───────────────────────────────────────────────────
function renderStatewide(main) {
  const s = DATA.summary;
  const voted = s.VotedCount || 0;
  const out   = s.OutCount   || 0;
  const total = voted + out;

// ── CUMULATIVE LINE CHART ─────────────────────────────────────────────────
function buildCumulativeChart(daily) {
  const labels = daily.map(d => shortDate(d.ReturnDate, d.DayOfWeek));

  // End-of-line label plugin
  const endLabelPlugin = {
    id: 'endLabel',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds, i) => {
        if (ds.hidden || !ds.endLabel) return;
        const meta = chart.getDatasetMeta(i);
        const pts  = meta.data.filter(p => p && !isNaN(p.x));
        if (!pts.length) return;
        const last = pts[pts.length - 1];
        ctx.save();
        ctx.font = "bold 10px 'DM Sans', sans-serif";
        ctx.fillStyle = ds.borderColor;
        ctx.textAlign = 'left';
        ctx.fillText(ds.endLabel, last.x + 6, last.y + 4);
        ctx.restore();
      });
    }
  };

  const demColor  = cssVar('--dem');
  const repColor  = cssVar('--rep');
  const ipColor   = cssVar('--ip');
  const mailColor = cssVar('--mail');

  const datasets = [
    {
      id: 'total',
      label: 'Total',
      data: daily.map(d => d.CumTotalReturned),
      borderColor: cssVar('--accent'),
      backgroundColor: 'rgba(58,143,212,.08)',
      fill: true,
      tension: .35,
      borderWidth: 2.5,
      pointRadius: 4,
      pointHoverRadius: 6,
      hidden: true,
    },
    {
      id: 'ip',
      label: 'In-Person',
      endLabel: 'In-Person',
      data: daily.map(d => d.CumInPersonTotal),
      borderColor: ipColor,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      borderWidth: 2,
      pointRadius: 3,
      borderDash: [],
      hidden: true,
    },
    {
      id: 'mail',
      label: 'Mail',
      endLabel: 'Mail',
      data: daily.map(d => d.CumMailTotal),
      borderColor: mailColor,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      borderWidth: 2,
      pointRadius: 3,
      hidden: true,
    },
    {
      id: 'dem_ip',
      label: 'Dem In-Person',
      endLabel: 'Dem IP',
      data: daily.map(d => d.CumInPersonDem),
      borderColor: demColor,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      borderWidth: 2,
      borderDash: [6, 3],
      pointRadius: 2,
      pointStyle: 'circle',
      hidden: false,
    },
    {
      id: 'rep_ip',
      label: 'Rep In-Person',
      endLabel: 'Rep IP',
      data: daily.map(d => d.CumInPersonRep),
      borderColor: repColor,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      borderWidth: 2,
      borderDash: [6, 3],
      pointRadius: 2,
      hidden: false,
    },
    {
      id: 'dem_mail',
      label: 'Dem Mail',
      endLabel: 'Dem Mail',
      data: daily.map(d => d.CumMailDem),
      borderColor: demColor,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      borderWidth: 2,
      borderDash: [2, 2],
      pointRadius: 2,
      hidden: false,
    },
    {

  const c = new Chart(document.getElementById('chart-cumulative'), {

function updateCumulativeChart(state) {
  const c = charts['chart-cumulative'];
  if (!c) return;
  const map = { total: 0, ip: 1, mail: 2, dem_ip: 3, rep_ip: 4, dem_mail: 5, rep_mail: 6 };
  Object.entries(map).forEach(([k, i]) => {
    c.data.datasets[i].hidden = !state[k];
  });
  c.update();
}

function buildComparisonChart(cmp, state) {
  const curName  = cmp.current_election;
  const curElec  = cmp.elections.find(e => e.name === curName);
  const priors   = cmp.elections.filter(e => e.name !== curName);

  // Build a unified sorted set of days_before values across all elections
  const allDays = [...new Set(
    cmp.elections.flatMap(e => e.days.map(d => d.days_before))
  )].sort((a, b) => b - a);  // descending: 50 → 0

  const labels = allDays.map(d => `D-${d}`);

  function makeDataset(elec, field, color, dashed, labelSuffix) {
    const lookup = {};
    elec.days.forEach(d => { lookup[d.days_before] = d[field]; });
    return {
      label: elec.label + labelSuffix,
      data:  allDays.map(d => lookup[d] != null ? lookup[d] : null),
      borderColor: color,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      borderWidth: dashed ? 2 : 2.5,
      borderDash: dashed ? [6, 4] : [],
      pointRadius: dashed ? 2 : 3,
      pointHoverRadius: 5,
      spanGaps: false,
    };
  }

  const demColor  = cssVar('--dem');
  const repColor  = cssVar('--rep');
  const accentColor = cssVar('--accent');
  const ipColor   = cssVar('--ip');
  const mailColor = cssVar('--mail');

  const datasets = [];

  // For each series, add current (solid) then each prior (dashed)
  const series = [
    { key: 'total', field: 'total_voted',  color: accentColor, label: ' — Total' },
    { key: 'ip',    field: 'in_person',    color: ipColor,     label: ' — In-Person' },
    { key: 'mail',  field: 'mail',         color: mailColor,   label: ' — Mail' },
    { key: 'dem',   field: 'dem_voted',    color: demColor,    label: ' — Dem' },
    { key: 'rep',   field: 'rep_voted',    color: repColor,    label: ' — Rep' },
  ];

  series.forEach(s => {
    if (curElec) {
      datasets.push({ ...makeDataset(curElec, s.field, s.color, false, s.label), cmpKey: s.key, hidden: !state[s.key] });
    }
    priors.forEach(p => {
      datasets.push({ ...makeDataset(p, s.field, s.color, true, s.label + ' (prior)'), cmpKey: s.key, hidden: !state[s.key] });
    });
  });

  const c = new Chart(document.getElementById('chart-comparison'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      layout: { padding: { right: 20 } },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: false,
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`,
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: cssVar('--muted'),
            font: { family: "'DM Mono', monospace", size: 10 },
            maxTicksLimit: 15,
            maxRotation: 45,
          },
        },
        y: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: {
            color: cssVar('--muted'),
            font: { family: "'DM Mono', monospace", size: 10 },
            callback: v => fmt(v),
          },
        },
      },
    },
  });
  charts['chart-comparison'] = c;
  updateComparisonChart(state);
}

function updateComparisonChart(state) {
  const c = charts['chart-comparison'];
  if (!c) return;
  c.data.datasets.forEach((ds, i) => {
    if (ds.cmpKey) {
      if (state[ds.cmpKey]) { c.show(i); } else { c.hide(i); }
    }
  });
}

// ── PARTY PACE TAB ───────────────────────────────────────────────────────
function renderPartyPace(main) {
  const cmp = DATA.comparison;
  if (!cmp || !cmp.elections || cmp.elections.length === 0) {
    main.innerHTML = `<div class="loading">No comparison data available.</div>`;
    return;
  }

  const curName   = cmp.current_election;
  const curElec   = cmp.elections.find(e => e.name === curName);
  const priorElec = cmp.elections.find(e => e.name !== curName);
  const summary   = cmp.summary || {};
  const priorMatch = summary.prior_comparisons && summary.prior_comparisons[0];

  const curLabel   = curElec   ? curElec.label   : curName;
  const priorLabel = priorElec ? priorElec.label : '';

  // Lookup maps keyed by days_before
  const curLookup   = {};
  const priorLookup = {};
  if (curElec)   curElec.days.forEach(d   => { curLookup[d.days_before]   = d; });
  if (priorElec) priorElec.days.forEach(d => { priorLookup[d.days_before] = d; });

  // Summary card values at current day
  const curDay      = summary.current_day || 0;
  const curDem      = curLookup[curDay]   ? curLookup[curDay].dem_voted   : 0;
  const curRep      = curLookup[curDay]   ? curLookup[curDay].rep_voted   : 0;
  const priorDem    = priorLookup[curDay] ? priorLookup[curDay].dem_voted : 0;
  const priorRep    = priorLookup[curDay] ? priorLookup[curDay].rep_voted : 0;
  const demDiff     = curDem - priorDem;
  const repDiff     = curRep - priorRep;
  const demSign     = demDiff >= 0 ? '+' : '';
  const repSign     = repDiff >= 0 ? '+' : '';

  main.innerHTML = `
    <div>
      <div class="section-title">Party Pace — ${curLabel} vs ${priorLabel}</div>
      <div class="stat-grid" id="pp-stat-grid"></div>
    </div>
    <div class="chart-card tall wide">
      <div class="toggle-row">
        <h3>Cumulative Dem &amp; Rep Voted — Days Before Election</h3>
        <div style="font-family:var(--mono);font-size:.65rem;letter-spacing:.10em;text-transform:uppercase;color:var(--muted)">
          Solid = ${curLabel} &nbsp;|&nbsp; Dashed = ${priorLabel}
        </div>
      </div>
      <canvas id="chart-partypace"></canvas>
    </div>`;

  document.getElementById('pp-stat-grid').innerHTML = statCards([
    { cls:'dem', label:'Dem — ' + curLabel,     val: curDem,   sub: 'day ' + curDay + ' before election' },
    { cls:'dem', label:'Dem — ' + priorLabel,   val: priorDem, sub: 'same point' },
    { cls: demDiff >= 0 ? 'dem' : 'rep',
      label: 'Dem Difference',
      val: Math.abs(demDiff),
      sub: demSign + fmt(demDiff) + (demDiff >= 0 ? ' — ahead' : ' — behind') },
    { cls:'rep', label:'Rep — ' + curLabel,     val: curRep,   sub: 'day ' + curDay + ' before election' },
    { cls:'rep', label:'Rep — ' + priorLabel,   val: priorRep, sub: 'same point' },
    { cls: repDiff <= 0 ? 'dem' : 'rep',
      label: 'Rep Difference',
      val: Math.abs(repDiff),
      sub: repSign + fmt(repDiff) + (repDiff >= 0 ? ' — ahead' : ' — behind') },
  ]);

  buildPartyPaceChart(curElec, priorElec, curLabel, priorLabel);
}

function buildPartyPaceChart(curElec, priorElec, curLabel, priorLabel) {
  const curLookup   = {};
  const priorLookup = {};
  if (curElec)   curElec.days.forEach(d   => { curLookup[d.days_before]   = d; });
  if (priorElec) priorElec.days.forEach(d => { priorLookup[d.days_before] = d; });

  const allDays = [...new Set([
    ...Object.keys(curLookup).map(Number),
    ...Object.keys(priorLookup).map(Number),
  ])].sort((a, b) => b - a);

  const labels   = allDays.map(d => `D-${d}`);
  const demColor = cssVar('--dem');
  const repColor = cssVar('--rep');

  const datasets = [
    {
      label:       curLabel + ' — Dem',
      data:        allDays.map(d => curLookup[d]   ? curLookup[d].dem_voted   : null),
      borderColor: demColor,
      borderWidth: 2.5,
      borderDash:  [],
      pointRadius: 3,
      fill: false, tension: .35, backgroundColor: 'transparent', spanGaps: false,
    },
    {
      label:       priorLabel + ' — Dem',
      data:        allDays.map(d => priorLookup[d] ? priorLookup[d].dem_voted : null),
      borderColor: demColor,
      borderWidth: 2,
      borderDash:  [6, 4],
      pointRadius: 2,
      fill: false, tension: .35, backgroundColor: 'transparent', spanGaps: false,
    },
    {
      label:       curLabel + ' — Rep',
      data:        allDays.map(d => curLookup[d]   ? curLookup[d].rep_voted   : null),
      borderColor: repColor,
      borderWidth: 2.5,
      borderDash:  [],
      pointRadius: 3,
      fill: false, tension: .35, backgroundColor: 'transparent', spanGaps: false,
    },
    {
      label:       priorLabel + ' — Rep',
      data:        allDays.map(d => priorLookup[d] ? priorLookup[d].rep_voted : null),
      borderColor: repColor,
      borderWidth: 2,
      borderDash:  [6, 4],
      pointRadius: 2,
      fill: false, tension: .35, backgroundColor: 'transparent', spanGaps: false,
    },
  ];

  const endLabelPlugin = {
    id: 'endLabelPP',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds, i) => {
        if (ds.hidden || !ds.endLabel) return;
        const meta = chart.getDatasetMeta(i);
        const pts  = meta.data.filter(p => p && !isNaN(p.x));
        if (!pts.length) return;
        const last = pts[pts.length - 1];
        ctx.save();
        ctx.font = "bold 10px 'DM Sans', sans-serif";
        ctx.fillStyle = ds.borderColor;
        ctx.textAlign = 'left';
        ctx.fillText(ds.endLabel, last.x + 6, last.y + 4);
        ctx.restore();
      });
    }
  };

  // Add end labels to current-election lines only
  datasets[0].endLabel = 'Dem';
  datasets[2].endLabel = 'Rep';

  const c = new Chart(document.getElementById('chart-partypace'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      layout: { padding: { right: 50 } },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          labels: {
            color: cssVar('--muted'),
            font: { family: "'DM Sans', sans-serif", size: 11 },
            boxWidth: 14, boxHeight: 14,
          },
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`,
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: cssVar('--muted'),
            font: { family: "'DM Mono', monospace", size: 10 },
            maxTicksLimit: 15,
            maxRotation: 45,
          },
        },
        y: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: {
            color: cssVar('--muted'),
            font: { family: "'DM Mono', monospace", size: 10 },
            callback: v => fmt(v),
          },
        },
      },
    },
    plugins: [endLabelPlugin],
  });
  charts['chart-partypace'] = c;
}

// ── TABLES ────────────────────────────────────────────────────────────────
function buildCountyTable(rows) {
  const tbl = document.getElementById('county-table');
  const tot = sumRows(rows);
  tbl.innerHTML = `
    <thead><tr>
      <th style="text-align:left">County</th>
      <th>D Ret</th><th>R Ret</th><th>U Ret</th><th>Total Ret</th>
      <th>D Out</th><th>R Out</th><th>U Out</th><th>Total Out</th>
      <th>Ret%</th>
    </tr></thead>
    <tbody>
      ${totalRowHTML(tot,'STATEWIDE')}
      ${rows.map(r => countyRowHTML(r)).join('')}
    </tbody>`;
  document.getElementById('county-footer').textContent = `${rows.length} counties`;
  tbl.querySelectorAll('tbody tr.county-row').forEach(tr => {
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => selectCounty(tr.dataset.county));
  });
}

function buildPrecinctTable(rows) {
  const tbl = document.getElementById('precinct-table');
  if (!tbl) return;
  const tot = sumRows(rows);
  tbl.innerHTML = `
    <thead><tr>
      <th style="text-align:left">Precinct</th>
      <th>D Ret</th><th>R Ret</th><th>U Ret</th><th>Total Ret</th>
      <th>D Out</th><th>R Out</th><th>U Out</th><th>Total Out</th>
      <th>Ret%</th>
    </tr></thead>
    <tbody>
      ${totalRowHTML(tot,'TOTAL')}
      ${rows.map(r => precinctRowHTML(r)).join('')}
    </tbody>`;
  const footer = document.getElementById('precinct-footer');
  if (footer) footer.textContent = `${rows.length} precincts`;
}

function countyRowHTML(r) {
  const voted = r.VotedCount || 0, out = r.OutCount || 0, total = voted + out;
  return `<tr class="county-row" data-county="${escHtml(r.CountyName)}">
    <td>${escHtml(r.CountyName)}</td>
    <td class="dem-col">${fmt(r.DemVotedCount)}</td>
    <td class="rep-col">${fmt(r.RepVotedCount)}</td>
    <td class="unk-col">${fmt(r.UnknownVotedCount)}</td>
    <td>${fmt(voted)}</td>
    <td class="dem-col">${fmt(r.DemOutCount)}</td>
    <td class="rep-col">${fmt(r.RepOutCount)}</td>
    <td class="unk-col">${fmt(r.UnknownOutCount)}</td>
    <td class="out-col">${fmt(out)}</td>
    <td>${pct(voted, total)}</td>
  </tr>`;
}

function precinctRowHTML(r) {
  const voted = r.VotedCount || 0, out = r.OutCount || 0, total = voted + out;
  return `<tr>
    <td>${escHtml(r.PrecinctName)}</td>
    <td class="dem-col">${fmt(r.DemVotedCount)}</td>
    <td class="rep-col">${fmt(r.RepVotedCount)}</td>
    <td class="unk-col">${fmt(r.UnknownVotedCount)}</td>
    <td>${fmt(voted)}</td>
    <td class="dem-col">${fmt(r.DemOutCount)}</td>
    <td class="rep-col">${fmt(r.RepOutCount)}</td>
    <td class="unk-col">${fmt(r.UnknownOutCount)}</td>
    <td class="out-col">${fmt(out)}</td>
    <td>${pct(voted, total)}</td>
  </tr>`;
}

function totalRowHTML(r, label) {
  const voted = r.VotedCount || 0, out = r.OutCount || 0, total = voted + out;
  return `<tr style="background:rgba(58,143,212,.08);border-bottom:2px solid var(--accent)">
    <td style="font-family:var(--sans);color:var(--accent);font-weight:700;letter-spacing:.05em">${label}</td>
    <td class="dem-col">${fmt(r.DemVotedCount)}</td>
    <td class="rep-col">${fmt(r.RepVotedCount)}</td>
    <td class="unk-col">${fmt(r.UnknownVotedCount)}</td>
    <td style="font-weight:600">${fmt(voted)}</td>
    <td class="dem-col">${fmt(r.DemOutCount)}</td>
    <td class="rep-col">${fmt(r.RepOutCount)}</td>
    <td class="unk-col">${fmt(r.UnknownOutCount)}</td>
    <td class="out-col">${fmt(out)}</td>
    <td style="font-weight:600">${pct(voted, total)}</td>
  </tr>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}
function pct(num, den) {
  if (!den) return '—';
  return (num / den * 100).toFixed(1) + '%';
}
function sumRows(rows) {
  const keys = ['DemVotedCount','RepVotedCount','UnknownVotedCount',
                'VotedCount','DemOutCount','RepOutCount','UnknownOutCount','OutCount'];
  const out = {};
  keys.forEach(k => { out[k] = rows.reduce((s, r) => s + (r[k] || 0), 0); });
  return out;
}
function statCards(items) {
  return items.map(i => {
    if (i.divider) return `<hr class="stat-divider">`;
    return `<div class="stat-card ${i.cls}">
      <div class="stat-label">${i.label}</div>
      <div class="stat-value">${fmt(i.val)}</div>
      <div class="stat-sub">${i.sub || ''}</div>
    </div>`;
  }).join('');
}
function shortDate(dateStr, dow) {
  const d = new Date(dateStr + 'T12:00:00');
  const label = `${d.getMonth()+1}/${d.getDate()}`;
  const isWknd = dow === 'Saturday' || dow === 'Sunday';
  return isWknd ? label + ' †' : label;
}
function cssVar(v) {
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}
function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();
