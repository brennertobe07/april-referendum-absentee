<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April Referendum — Absentee Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --dem:      #2166ac;
    --dem-lt:   #74add1;
    --rep:      #c0392b;
    --rep-lt:   #e57368;
    --unk:      #7f8c8d;
    --unk-lt:   #b2bec3;
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --text:     #e8eaf0;
    --muted:    #8890a8;
    --accent:   #3a8fd4;
    --green:    #27ae60;
    --green-lt: #55c97a;
    --radius:   8px;
    --mono:     'DM Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .03em;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  #last-updated {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 230px 1fr;
    min-height: calc(100vh - 53px);
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 14px;
    overflow-y: auto;
  }
  aside h2 {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 8px;
  }
  #county-search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: .82rem;
    padding: 7px 10px;
    border-radius: var(--radius);
    margin-bottom: 8px;
    outline: none;
  }
  #county-search:focus { border-color: var(--accent); }
  #county-search::placeholder { color: var(--muted); }

  #county-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #county-list li {
    padding: 7px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: .82rem;
    color: var(--muted);
    transition: background .12s, color .12s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #county-list li:hover { background: var(--border); color: var(--text); }
  #county-list li.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  #county-list li .badge {
    font-family: var(--mono);
    font-size: .68rem;
    background: rgba(255,255,255,.12);
    padding: 1px 6px;
    border-radius: 20px;
  }
  .statewide-btn {
    display: block;
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: .82rem;
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    font-weight: 600;
    letter-spacing: .02em;
    transition: background .12s, border-color .12s;
  }
  .statewide-btn:hover { background: var(--border); }
  .statewide-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── MAIN CONTENT ── */
  main {
    padding: 24px 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-title {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── STAT CARDS ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-card.dem   { border-top: 3px solid var(--dem); }
  .stat-card.rep   { border-top: 3px solid var(--rep); }
  .stat-card.unk   { border-top: 3px solid var(--unk); }
  .stat-card.total { border-top: 3px solid var(--accent); }
  .stat-card.out   { border-top: 3px solid var(--green); }
  .stat-label {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
  }
  .stat-sub {
    font-size: .72rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat-pct {
    font-family: var(--mono);
    font-size: .78rem;
    margin-top: 2px;
  }
  .stat-card.dem .stat-pct { color: var(--dem-lt); }
  .stat-card.rep .stat-pct { color: var(--rep-lt); }
  .stat-card.unk .stat-pct { color: var(--unk-lt); }
  .stat-card.out .stat-pct { color: var(--green-lt); }

  /* ── CHART GRID ── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .chart-card h3 {
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .chart-card canvas { max-height: 220px; }

  /* ── PRECINCT TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .table-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .table-header h3 {
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #precinct-search {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: .8rem;
    padding: 5px 10px;
    border-radius: var(--radius);
    outline: none;
    width: 200px;
  }
  #precinct-search:focus { border-color: var(--accent); }
  #precinct-search::placeholder { color: var(--muted); }

  .table-scroll { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .8rem;
  }
  thead th {
    padding: 10px 14px;
    text-align: right;
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,.03);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:first-child { text-align: left; }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  td {
    padding: 9px 14px;
    text-align: right;
    font-family: var(--mono);
    font-size: .78rem;
    color: var(--text);
    white-space: nowrap;
  }
  td:first-child { text-align: left; font-family: var(--sans); color: var(--text); }
  td.county-col { color: var(--muted); font-size: .73rem; }
  td.dem-col { color: var(--dem-lt); }
  td.rep-col { color: var(--rep-lt); }
  td.unk-col { color: var(--unk-lt); }
  td.out-col { color: var(--green-lt); }

  .pct-bar {
    display: flex;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
    min-width: 60px;
  }
  .pct-bar .b-dem { background: var(--dem); }
  .pct-bar .b-rep { background: var(--rep); }
  .pct-bar .b-unk { background: var(--unk); }

  /* ── TABLE FOOTER ── */
  .table-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    font-size: .72rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── LOADING / EMPTY ── */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: .9rem;
  }
  .error-box {
    background: rgba(192,57,43,.12);
    border: 1px solid rgba(192,57,43,.4);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: #e57368;
    font-family: var(--mono);
    font-size: .82rem;
  }

  /* ── LEGEND PILL ── */
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: .72rem;
    color: var(--muted);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<header>
  <h1>Virginia <span>April Referendum</span> — Absentee Ballot Tracker</h1>
  <div id="last-updated">Loading...</div>
</header>

<div class="layout">
  <aside>
    <button class="statewide-btn active" id="btn-statewide">🗺 Statewide</button>
    <h2>Counties</h2>
    <input type="text" id="county-search" placeholder="Search county…">
    <ul id="county-list"></ul>
  </aside>

  <main id="main-content">
    <div class="loading">Loading data…</div>
  </main>
</div>

<script>
// ── DATA STORE ────────────────────────────────────────────────────────────
let DATA = { summary: null, counties: [], precincts: [], meta: null };
let currentCounty = null; // null = statewide
let precinctSortCol = null;
let precinctSortDir = 1;
let charts = {};

// ── FETCH ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [summary, counties, precincts, meta] = await Promise.all([
      fetch('data/summary.json').then(r => r.json()),
      fetch('data/counties.json').then(r => r.json()),
      fetch('data/precincts.json').then(r => r.json()),
      fetch('data/metadata.json').then(r => r.json()),
    ]);
    DATA = { summary, counties, precincts, meta };
    document.getElementById('last-updated').textContent =
      `Updated: ${meta.last_updated}`;
    buildSidebar();
    renderView();
  } catch (err) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-box">Failed to load data files. Make sure data/*.json files are present.<br>${err}</div>`;
  }
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function buildSidebar() {
  const ul = document.getElementById('county-list');
  const counties = DATA.counties.slice().sort((a,b) => a.CountyName.localeCompare(b.CountyName));

  function render(filter='') {
    ul.innerHTML = '';
    counties
      .filter(c => c.CountyName.toLowerCase().includes(filter.toLowerCase()))
      .forEach(c => {
        const li = document.createElement('li');
        li.dataset.county = c.CountyName;
        if (currentCounty === c.CountyName) li.classList.add('active');
        li.innerHTML = `<span>${c.CountyName}</span>
          <span class="badge">${fmt(c.VotedCount)}</span>`;
        li.addEventListener('click', () => selectCounty(c.CountyName));
        ul.appendChild(li);
      });
  }

  render();
  document.getElementById('county-search').addEventListener('input', e => render(e.target.value));
}

function selectCounty(name) {
  currentCounty = name;
  document.getElementById('btn-statewide').classList.remove('active');
  document.querySelectorAll('#county-list li').forEach(li => {
    li.classList.toggle('active', li.dataset.county === name);
  });
  renderView();
}

document.getElementById('btn-statewide').addEventListener('click', () => {
  currentCounty = null;
  document.getElementById('btn-statewide').classList.add('active');
  document.querySelectorAll('#county-list li').forEach(li => li.classList.remove('active'));
  renderView();
});

// ── RENDER ────────────────────────────────────────────────────────────────
function renderView() {
  destroyCharts();
  const main = document.getElementById('main-content');

  if (currentCounty === null) {
    renderStatewide(main);
  } else {
    renderCounty(main, currentCounty);
  }
}

function renderStatewide(main) {
  const s = DATA.summary;
  const voted = s.VotedCount || 0;
  const out   = s.OutCount || 0;
  const total = voted + out;

  main.innerHTML = `
    <div>
      <div class="section-title">Statewide Summary</div>
      <div class="stat-grid" id="stat-grid"></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3>Ballots Returned — by Party</h3>
        <canvas id="chart-voted"></canvas>
      </div>
      <div class="chart-card">
        <h3>Ballots Still Out — by Party</h3>
        <canvas id="chart-out"></canvas>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <h3>County Breakdown</h3>
      </div>
      <div class="table-scroll">
        <table id="county-table"></table>
      </div>
      <div class="table-footer" id="county-footer"></div>
    </div>`;

  // Cards
  const sg = document.getElementById('stat-grid');
  sg.innerHTML = statCards([
    { cls:'total', label:'Total Universe', val: total, sub: s.CountyCount+' counties' },
    { cls:'total', label:'Ballots Returned', val: voted, sub: pct(voted,total)+' return rate' },
    { cls:'dem',   label:'Dem Returned', val: s.DemVotedCount, sub: pct(s.DemVotedCount, voted)+' of returned' },
    { cls:'rep',   label:'Rep Returned', val: s.RepVotedCount, sub: pct(s.RepVotedCount, voted)+' of returned' },
    { cls:'unk',   label:'Unknown Returned', val: s.UnknownVotedCount, sub: pct(s.UnknownVotedCount, voted)+' of returned' },
    { cls:'out',   label:'Still Out', val: out, sub: pct(out, total)+' of universe' },
    { cls:'dem',   label:'Dem Still Out', val: s.DemOutCount, sub: pct(s.DemOutCount, out)+' of still out' },
    { cls:'rep',   label:'Rep Still Out', val: s.RepOutCount, sub: pct(s.RepOutCount, out)+' of still out' },
  ]);

  // Charts
  buildPartyChart('chart-voted',
    [s.DemVotedCount, s.RepVotedCount, s.UnknownVotedCount]);
  buildPartyChart('chart-out',
    [s.DemOutCount, s.RepOutCount, s.UnknownOutCount]);

  // County table
  buildCountyTable(DATA.counties);
}

function renderCounty(main, countyName) {
  const cRow = DATA.counties.find(c => c.CountyName === countyName) || {};
  const precincts = DATA.precincts.filter(p => p.CountyName === countyName);
  const voted = cRow.VotedCount || 0;
  const out   = cRow.OutCount || 0;
  const total = voted + out;

  main.innerHTML = `
    <div>
      <div class="section-title">${countyName} County</div>
      <div class="stat-grid" id="stat-grid"></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3>Ballots Returned — by Party</h3>
        <canvas id="chart-voted"></canvas>
      </div>
      <div class="chart-card">
        <h3>Ballots Still Out — by Party</h3>
        <canvas id="chart-out"></canvas>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <h3>Precincts — ${countyName}</h3>
        <input type="text" id="precinct-search" placeholder="Search precinct…">
      </div>
      <div class="table-scroll">
        <table id="precinct-table"></table>
      </div>
      <div class="table-footer" id="precinct-footer"></div>
    </div>`;

  const sg = document.getElementById('stat-grid');
  sg.innerHTML = statCards([
    { cls:'total', label:'Total Universe', val: total, sub: precincts.length+' precincts' },
    { cls:'total', label:'Ballots Returned', val: voted, sub: pct(voted,total)+' return rate' },
    { cls:'dem',   label:'Dem Returned', val: cRow.DemVotedCount, sub: pct(cRow.DemVotedCount, voted)+' of returned' },
    { cls:'rep',   label:'Rep Returned', val: cRow.RepVotedCount, sub: pct(cRow.RepVotedCount, voted)+' of returned' },
    { cls:'unk',   label:'Unknown Returned', val: cRow.UnknownVotedCount, sub: pct(cRow.UnknownVotedCount, voted)+' of returned' },
    { cls:'out',   label:'Still Out', val: out, sub: pct(out, total)+' of universe' },
    { cls:'dem',   label:'Dem Still Out', val: cRow.DemOutCount, sub: pct(cRow.DemOutCount, out)+' of still out' },
    { cls:'rep',   label:'Rep Still Out', val: cRow.RepOutCount, sub: pct(cRow.RepOutCount, out)+' of still out' },
  ]);

  buildPartyChart('chart-voted',
    [cRow.DemVotedCount, cRow.RepVotedCount, cRow.UnknownVotedCount]);
  buildPartyChart('chart-out',
    [cRow.DemOutCount, cRow.RepOutCount, cRow.UnknownOutCount]);

  buildPrecinctTable(precincts);

  document.getElementById('precinct-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    buildPrecinctTable(precincts.filter(p =>
      p.PrecinctName.toLowerCase().includes(q)));
  });
}

// ── STAT CARDS ────────────────────────────────────────────────────────────
function statCards(items) {
  return items.map(i => `
    <div class="stat-card ${i.cls}">
      <div class="stat-label">${i.label}</div>
      <div class="stat-value">${fmt(i.val)}</div>
      <div class="stat-sub">${i.sub || ''}</div>
    </div>`).join('');
}

// ── CHARTS ────────────────────────────────────────────────────────────────
function buildPartyChart(id, [dem, rep, unk]) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const c = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Democrat', 'Republican', 'Unknown'],
      datasets: [{
        data: [dem||0, rep||0, unk||0],
        backgroundColor: [
          getComputedStyle(document.documentElement).getPropertyValue('--dem').trim(),
          getComputedStyle(document.documentElement).getPropertyValue('--rep').trim(),
          getComputedStyle(document.documentElement).getPropertyValue('--unk').trim(),
        ],
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fmt(ctx.parsed.y)
          }
        },
        datalabels: { display: false }
      },
      scales: {
        y: {
          grid: { color: 'rgba(255,255,255,.06)' },
          ticks: {
            color: '#8890a8',
            font: { family: "'DM Mono', monospace", size: 11 },
            callback: v => fmt(v)
          }
        },
        x: {
          grid: { display: false },
          ticks: { color: '#8890a8', font: { family: "'DM Sans', sans-serif", size: 11 } }
        }
      }
    }
  });
  charts[id] = c;
}

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

// ── COUNTY TABLE ──────────────────────────────────────────────────────────
function buildCountyTable(rows) {
  const tbl = document.getElementById('county-table');
  const totalRow = sumRows(rows);

  tbl.innerHTML = `
    <thead>
      <tr>
        <th style="text-align:left">County</th>
        <th title="Dem Returned">D Ret</th>
        <th title="Rep Returned">R Ret</th>
        <th title="Unknown Returned">U Ret</th>
        <th title="Total Returned">Total Ret</th>
        <th title="Dem Still Out">D Out</th>
        <th title="Rep Still Out">R Out</th>
        <th title="Unknown Still Out">U Out</th>
        <th title="Total Still Out">Total Out</th>
        <th title="Return Rate">Ret%</th>
      </tr>
    </thead>
    <tbody>
      ${totalRowHTML(totalRow, 'STATEWIDE')}
      ${rows.map(r => countyRowHTML(r)).join('')}
    </tbody>`;

  document.getElementById('county-footer').textContent =
    `${rows.length} counties`;

  tbl.querySelectorAll('tbody tr.county-row').forEach(tr => {
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => selectCounty(tr.dataset.county));
  });
}

function countyRowHTML(r) {
  const voted = r.VotedCount || 0;
  const out   = r.OutCount || 0;
  const total = voted + out;
  return `
    <tr class="county-row" data-county="${escHtml(r.CountyName)}">
      <td>${escHtml(r.CountyName)}</td>
      <td class="dem-col">${fmt(r.DemVotedCount)}</td>
      <td class="rep-col">${fmt(r.RepVotedCount)}</td>
      <td class="unk-col">${fmt(r.UnknownVotedCount)}</td>
      <td>${fmt(voted)}</td>
      <td class="dem-col">${fmt(r.DemOutCount)}</td>
      <td class="rep-col">${fmt(r.RepOutCount)}</td>
      <td class="unk-col">${fmt(r.UnknownOutCount)}</td>
      <td class="out-col">${fmt(out)}</td>
      <td>${pct(voted, total)}</td>
    </tr>`;
}

// ── PRECINCT TABLE ────────────────────────────────────────────────────────
function buildPrecinctTable(rows) {
  const tbl = document.getElementById('precinct-table');
  if (!tbl) return;
  const totalRow = sumRows(rows);

  tbl.innerHTML = `
    <thead>
      <tr>
        <th style="text-align:left">Precinct</th>
        <th>D Ret</th>
        <th>R Ret</th>
        <th>U Ret</th>
        <th>Total Ret</th>
        <th>D Out</th>
        <th>R Out</th>
        <th>U Out</th>
        <th>Total Out</th>
        <th>Ret%</th>
      </tr>
    </thead>
    <tbody>
      ${totalRowHTML(totalRow, 'TOTAL')}
      ${rows.map(r => precinctRowHTML(r)).join('')}
    </tbody>`;

  const footer = document.getElementById('precinct-footer');
  if (footer) footer.textContent = `${rows.length} precincts`;
}

function precinctRowHTML(r) {
  const voted = r.VotedCount || 0;
  const out   = r.OutCount || 0;
  const total = voted + out;
  return `
    <tr>
      <td>${escHtml(r.PrecinctName)}</td>
      <td class="dem-col">${fmt(r.DemVotedCount)}</td>
      <td class="rep-col">${fmt(r.RepVotedCount)}</td>
      <td class="unk-col">${fmt(r.UnknownVotedCount)}</td>
      <td>${fmt(voted)}</td>
      <td class="dem-col">${fmt(r.DemOutCount)}</td>
      <td class="rep-col">${fmt(r.RepOutCount)}</td>
      <td class="unk-col">${fmt(r.UnknownOutCount)}</td>
      <td class="out-col">${fmt(out)}</td>
      <td>${pct(voted, total)}</td>
    </tr>`;
}

function totalRowHTML(r, label) {
  const voted = r.VotedCount || 0;
  const out   = r.OutCount || 0;
  const total = voted + out;
  return `
    <tr style="background:rgba(58,143,212,.08); font-weight:600; border-bottom:2px solid var(--accent)">
      <td style="font-family:var(--sans); color:var(--accent); font-weight:700; letter-spacing:.05em">${label}</td>
      <td class="dem-col">${fmt(r.DemVotedCount)}</td>
      <td class="rep-col">${fmt(r.RepVotedCount)}</td>
      <td class="unk-col">${fmt(r.UnknownVotedCount)}</td>
      <td>${fmt(voted)}</td>
      <td class="dem-col">${fmt(r.DemOutCount)}</td>
      <td class="rep-col">${fmt(r.RepOutCount)}</td>
      <td class="unk-col">${fmt(r.UnknownOutCount)}</td>
      <td class="out-col">${fmt(out)}</td>
      <td>${pct(voted, total)}</td>
    </tr>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}

function pct(num, den) {
  if (!den) return '—';
  return (num / den * 100).toFixed(1) + '%';
}

function sumRows(rows) {
  const keys = ['DemVotedCount','RepVotedCount','UnknownVotedCount',
                 'VotedCount','DemOutCount','RepOutCount','UnknownOutCount','OutCount'];
  const out = {};
  keys.forEach(k => { out[k] = rows.reduce((s, r) => s + (r[k] || 0), 0); });
  return out;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── BOOT ──────────────────────────────────────────────────────────────────
loadData();
</script>
